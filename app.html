<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .draw-animation {
            animation: pulse-result 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes pulse-result {
            0% { transform: scale(0.9); opacity: 0.5; }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        body {

        }
        
        /* 手機版滾動設定 */
        @media (max-width: 767px) {
            .mobile-scrollable {

<body class="font-body-md text-body-md">

<!-- Controls Section -->

</div>
<div class="space-y-2">

<div class="flex items-center bg-surface-container border border-outline-variant rounded-xl p-1 h-touch-target">

<span class="material-symbols-outlined" data-icon="remove">remove</span>
</button>
<input class="w-full bg-transparent border-none text-center font-headline-md text-headline-md focus:ring-0 [-moz-appearance:_textfield] [&::-webkit-inner-spin-button]:m-0 [&::-webkit-inner-spin-button]:hidden [&::-webkit-outer-spin-button]:m-0 [&::-webkit-outer-spin-button]:hidden" id="max-val" min="1" max="10000" type="number" value="1" oninput="validateMaxInput(this)"/>
<button class="w-10 h-10 flex items-center justify-center text-primary hover:bg-surface-container-high rounded-lg transition-colors" onclick="increment('max')">
<span class="material-symbols-outlined" data-icon="add">add</span>

</div>

<!-- App Info -->
<div class="text-center space-y-4">
<h2 class="font-headline-lg text-headline-lg text-on-surface">Lucky Draw</h2>

一個簡單美觀的隨機數字生成器<br>

<!-- Features -->
<div class="bg-surface-container rounded-xl p-6 space-y-4">
<h3 class="font-headline-md text-headline-md text-on-surface text-center">主要功能</h3>
<div class="space-y-3">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">shuffle</span>

</div>

</div>

© 2026 Lucky Draw

<script>
        const history = [];
        let appData = {
            settings: {
                minValue: 1,
                maxValue: 1,
                historyLimit: 8
            },
            statistics: {
                totalDraws: 0,
                allTimeHistory: []
            }
        };

        // Initialize app data from localStorage
        function initializeApp() {
            const savedData = localStorage.getItem('lucky-draw-app-data');
            if (savedData) {
                appData = JSON.parse(savedData);
                // Restore settings to UI
                document.getElementById('min-val').value = appData.settings.minValue;
                document.getElementById('max-val').value = appData.settings.maxValue;
            }
            // Load history
            loadHistory();
        }

        // Save app data to localStorage
        function saveAppData() {
            localStorage.setItem('lucky-draw-app-data', JSON.stringify(appData));
        }

        // Load history from localStorage
        function loadHistory() {
            const savedHistory = localStorage.getItem('lucky-draw-history');
            if (savedHistory) {
                history.length = 0;
                history.push(...JSON.parse(savedHistory));
                renderHistory();
            }
        }

        // Save history to localStorage
        function saveHistory() {
            localStorage.setItem('lucky-draw-history', JSON.stringify(history));
        }

        // Update settings when values change
        function updateSettings(key, value) {
            // 檢查最大值上限
            if (key === 'max' && value > 10000) {
                showCustomAlert('最大值不能超過10000');
                // 恢復為10000
                document.getElementById('max-val').value = 10000;
                appData.settings.maxValue = 10000;
                saveAppData();
                return;
            }
            
            if (key === 'min') {
                appData.settings.minValue = value;
            } else if (key === 'max') {
                appData.settings.maxValue = value;
            }
            saveAppData();
        }

        // Toggle settings screen
        function toggleSettings() {
            const settingsScreen = document.getElementById('settings-screen');
            
            if (settingsScreen.classList.contains('hidden')) {
                // Show settings screen
                settingsScreen.classList.remove('hidden');
                settingsScreen.style.transform = 'translateX(100%)';
                setTimeout(() => {
                    settingsScreen.style.transform = 'translateX(0)';
                    settingsScreen.style.transition = 'transform 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
                }, 10);
            } else {
                // Hide settings screen
                settingsScreen.style.transform = 'translateX(100%)';
                setTimeout(() => {
                    settingsScreen.classList.add('hidden');
                }, 300);
            }
        }

                
        // 驗證最大值輸入
        function validateMaxInput(input) {
            const value = parseInt(input.value);
            if (value > 10000) {
                showCustomAlert('最大值不能超過10000');
                input.value = 10000;
                updateSettings('max', 10000);
            } else {
                updateSettings('max', value);
            }
        }

        function increment(id) {
            const input = document.getElementById(id + '-val');
            const newValue = parseInt(input.value) + 1;
            
            // 檢查最大值上限
            if (id === 'max' && newValue > 10000) {
                showCustomAlert('最大值不能超過10000');
                return;
            }
            
            input.value = newValue;
            updateSettings(id, newValue);
        }

        function decrement(id) {
            const input = document.getElementById(id + '-val');
            const currentValue = parseInt(input.value);
            if (currentValue > 0) {
                const newValue = currentValue - 1;
                input.value = newValue;
                updateSettings(id, newValue);
            }
        }

        function startDraw() {
            const min = parseInt(document.getElementById('min-val').value);
            const max = parseInt(document.getElementById('max-val').value);
            const resultEl = document.getElementById('draw-result');
            const resultContainer = document.getElementById('result-container');
            const btn = document.getElementById('draw-btn');

            if (min > max) {
                showCustomAlert('最小值必須小於或等於最大值');
                return;
            }

            // Disable interaction
            btn.disabled = true;
            btn.classList.add('opacity-50', 'scale-95');

            // Rapid rolling effect
            let counter = 0;
            const interval = setInterval(() => {
                const tempRand = Math.floor(Math.random() * (max - min + 1)) + min;
                resultEl.innerText = tempRand.toString().padStart(2, '0');
                counter++;
                if (counter > 15) {
                    clearInterval(interval);
                    finalizeDraw(min, max);
                }
            }, 60);
        }

        function finalizeDraw(min, max) {
            // 無限抽籤模式 - 允許重複數字
            const finalResult = Math.floor(Math.random() * (max - min + 1)) + min;
            
            const resultEl = document.getElementById('draw-result');
            const resultContainer = document.getElementById('result-container');
            const btn = document.getElementById('draw-btn');

            resultEl.innerText = finalResult.toString().padStart(2, '0');
            
            // Animation
            resultContainer.classList.remove('draw-animation');
            void resultContainer.offsetWidth; // trigger reflow
            resultContainer.classList.add('draw-animation');

            // Add to history
            addToHistory(finalResult);

            // Re-enable
            btn.disabled = false;
            btn.classList.remove('opacity-50', 'scale-95');
        }

        function addToHistory(val) {
            const historyItem = {
                value: val,
                time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                date: new Date().toLocaleDateString(),
                timestamp: Date.now()
            };
            
            // Add to current history
            history.unshift(historyItem);
            
            // Add to all-time history
            appData.statistics.allTimeHistory.unshift(historyItem);
            
            // Update statistics
            appData.statistics.totalDraws++;
            
            // Limit history display
            if (history.length > appData.settings.historyLimit) {
                history.pop();
            }
            
            // Limit all-time history (keep last 1000)
            if (appData.statistics.allTimeHistory.length > 1000) {
                appData.statistics.allTimeHistory.pop();
            }
            
            // Save data
            saveHistory();
            saveAppData();
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('history-list');
            
            if (history.length > 0) {
                list.innerHTML = history.map(item => `
                    <div class="flex flex-col items-center justify-center px-4 py-2 bg-surface-container border border-outline-variant rounded-lg animate-in fade-in slide-in-from-bottom-1 duration-300">
                        <span class="font-headline-md text-headline-md text-secondary">${item.value}</span>
                        <span class="text-[10px] text-on-surface-variant font-label-bold uppercase">${item.time}</span>
                    </div>
                `).join('');
            } else {
                list.innerHTML = '<p class="text-on-surface-variant font-body-md text-body-md opacity-60 italic" id="empty-history">尚無歷史記錄</p>';
            }
        }

        function clearHistory() {
            // Clear current history
            history.length = 0;
            
            // Clear all-time history
            appData.statistics.allTimeHistory = [];
            
            // Reset statistics
            appData.statistics.totalDraws = 0;
            
            // Save data
            saveHistory();
            saveAppData();
            renderHistory();
        }

        // Reset values function
        function resetValues() {
            // 重設為1
            const minValue = 1;
            const maxValue = 1;
            
            // 更新輸入框
            document.getElementById('min-val').value = minValue;
            document.getElementById('max-val').value = maxValue;
            
            // 更新設定
            appData.settings.minValue = minValue;
            appData.settings.maxValue = maxValue;
            
            // 儲存設定
            saveAppData();
        }

        // Custom Alert Functions
        function showCustomAlert(message) {
            const modal = document.getElementById('custom-alert');
            const content = document.getElementById('custom-alert-content');
            const messageEl = document.getElementById('custom-alert-message');
            
            messageEl.innerText = message;
            modal.classList.remove('hidden');
            
            // Trigger animation
            setTimeout(() => {
                content.classList.remove('scale-95', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }
        
        function hideCustomAlert() {
            const modal = document.getElementById('custom-alert');
            const content = document.getElementById('custom-alert-content');
            
            content.classList.remove('scale-100', 'opacity-100');
            content.classList.add('scale-95', 'opacity-0');
            
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        // Initialize app when DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            initializeApp();
        });

            </script>
</body></html>
